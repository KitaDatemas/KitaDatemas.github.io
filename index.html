    <body>
        <script>
            let audio = new Audio("yume_to_harazuka.mp3");
            let play = false;
            audio.loop = true;
            function playMusic(){
                play = !play;
                if (play)
                    audio.play();
                else
                    audio.pause();
            }
        </script>
